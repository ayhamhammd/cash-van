# Render Blueprint — deploys the WHOLE VanFlow stack to ONE free Render
# account: NestJS backend + Next.js frontend + a free managed PostgreSQL.
#
# Connect at https://render.com → "New +" → "Blueprint", pick this repo/branch
# (deploy/render). Render reads this file and creates all three resources.
#
# Because the frontend lives in a separate Git repo, it is a second free web
# service (cross-repo `repo:` below). One account, one blueprint, $0.
#
# FREE-TIER NOTES:
#   * Web services spin down after ~15 min idle (cold start on next request).
#   * Free PostgreSQL is deleted ~30 days after creation. For a permanent free
#     DB, create a Neon (neon.tech) Postgres and replace the DB_* values below.
#   * Container disk is ephemeral — uploaded files do NOT survive restarts.
#     Wire object storage (R2/S3) for durable uploads.
#   * NEXT_PUBLIC_* are inlined into the frontend at BUILD time. After the API
#     URL is known, set them on the frontend service and redeploy it.

databases:
  - name: cashvan-db
    plan: free
    databaseName: cashvan
    user: cashvan
    region: frankfurt

services:
  # ---- Backend API (this repo) ------------------------------------------------
  - type: web
    name: cashvan-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeploy: true
    # Run pending migrations + idempotent seed, then boot the API. Both are
    # no-ops once applied, so this is safe on every (cold) start. The chain
    # lives in the start:deploy npm script (npm runs it via a real shell) so
    # Render can exec it directly without shell-quoting issues.
    dockerCommand: npm run start:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        fromDatabase:
          name: cashvan-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cashvan-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: cashvan-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cashvan-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: cashvan-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: DB_LOGGING
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: RATE_LIMIT_TTL
        value: "60"
      - key: RATE_LIMIT_LIMIT
        value: "100"
      # Allows the frontend (and any origin) to call the API. Tighten to the
      # frontend URL once known, e.g. https://cashvan-web.onrender.com
      - key: CORS_ORIGINS
        value: "*"
      - key: CACHE_MAX_ENTRIES
        value: "5000"
      - key: CACHE_DEFAULT_TTL_SEC
        value: "300"
      - key: JOBS_ENABLED
        value: "true"
      - key: JOFOTARA_MOCK
        value: "true"
      # Required in production. 64 hex chars — generate with: openssl rand -hex 32
      - key: JOFOTARA_KMS_KEY
        sync: false
      - key: PHONE_HASH_SECRET
        generateValue: true

  # ---- Frontend dashboard (separate repo) -------------------------------------
  - type: web
    name: cashvan-web
    runtime: node
    plan: free
    region: frankfurt
    repo: https://github.com/JehadEAlomour/Flow-Van-Frontend
    branch: deploy/render
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Point these at the backend service URL (above). Inlined at build time,
      # so set the real values then trigger a redeploy of this service.
      #   https://cashvan-api.onrender.com/api/v1   and   https://cashvan-api.onrender.com
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
      - key: NEXT_PUBLIC_DEFAULT_LOCALE
        value: ar
      - key: NEXT_PUBLIC_AI_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
